<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0d1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>GPS Roteirizador</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --border:#30363d;--border2:#444c56;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --accent:#00c9a7;--adim:rgba(0,201,167,.13);--adk:#009f85;
  --red:#f85149;--rdim:rgba(248,81,73,.13);
  --blue:#58a6ff;--bdim:rgba(88,166,255,.13);
  --warn:#f0a500;--wdim:rgba(240,165,0,.13);
  --green:#3fb950;--gdim:rgba(63,185,80,.13);
  --r:10px;--rlg:16px;--hw:52px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text)}

/* ── DESKTOP layout ── */
body{display:flex;flex-direction:column}
.hdr{height:var(--hw);min-height:var(--hw);background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:200;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo-mk{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mk svg{width:16px;height:16px;fill:var(--bg)}
.logo-nm{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:-.3px}
.hdr-btns{display:flex;align-items:center;gap:6px}
.hbtn{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border);
  border-radius:20px;background:var(--bg2);color:var(--text2);font-size:11px;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.hbtn.on{border-color:var(--blue);color:var(--blue);background:var(--bdim)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .2s}
.hbtn.on .ldot{background:var(--blue);animation:blink 1s infinite}
.voice-btn{padding:5px 10px;border:1px solid var(--border);border-radius:20px;background:var(--bg2);
  color:var(--text2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.voice-btn.on{border-color:var(--accent);color:var(--accent);background:var(--adim)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.voice-wrap{display:flex;align-items:center;gap:4px}
.voice-select{height:28px;padding:0 4px;border:1px solid var(--border);border-radius:20px;
  background:var(--bg2);color:var(--text2);font-size:11px;cursor:pointer;outline:none;
  max-width:110px;-webkit-appearance:none;appearance:none;text-align:center}
.voice-select:focus{border-color:var(--accent)}

.main{flex:1;display:flex;overflow:hidden}

/* Desktop: side panel */
.panel{width:380px;min-width:380px;background:var(--bg);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;z-index:50}
.pscroll{flex:1;overflow-y:auto;padding:16px 16px 100px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.pscroll::-webkit-scrollbar{width:3px}
.pscroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#map{flex:1;background:#f2f2f2}

/* ── MOBILE layout: map top, panel bottom ── */
/* ── MOBILE LAYOUT ── */
#map-wrap{flex:1;position:relative;overflow:hidden;touch-action:pan-x pan-y pinch-zoom}
#map{width:100%;height:100%;position:absolute;inset:0}

@media(max-width:768px){
  .main{flex-direction:column!important}
  #map-wrap{
    flex:none!important;
    width:100%!important;
    height:52dvh!important;
    min-height:52dvh!important;
    max-height:52dvh!important;
  }
  .panel{
    width:100%!important;min-width:0!important;
    flex:1!important;border-right:none;
    border-top:1px solid var(--border);overflow:hidden;
  }
  .pscroll{padding:12px 14px 80px}
  .drag{display:none}
  .nav-hud{top:8px;left:8px;right:8px;transform:none;min-width:0;max-width:100%}
  .gps-bar{bottom:auto;top:calc(52dvh - 48px);left:8px;max-width:calc(100% - 64px)}
  .fab-follow{bottom:auto;top:calc(52dvh - 54px);right:8px}
  .radar-alert{top:auto;bottom:calc(48dvh + 8px)}
  .btn-reroute{bottom:auto;top:calc(52dvh - 60px)!important}
}
@media(max-width:480px){
  #map-wrap{height:45dvh!important;min-height:45dvh!important;max-height:45dvh!important}
  .gps-bar{top:calc(45dvh - 48px)}
  .fab-follow{top:calc(45dvh - 54px)}
  .radar-alert{bottom:calc(55dvh + 8px)}
  .btn-reroute{top:calc(45dvh - 60px)!important}
}

/* ── MOBILE NAVIGATION: map fullscreen ── */
@media(max-width:768px){
  body.navigating{overflow:hidden}
  body.navigating .main{flex-direction:column!important}
  body.navigating #map-wrap{
    position:fixed!important;inset:0!important;
    height:100dvh!important;max-height:none!important;
    width:100%!important;z-index:100!important;
  }
  body.navigating .panel{display:none!important}
  body.navigating .hdr{display:none!important}
  body.navigating #nav-back-btn{display:flex!important}
  body.navigating .gps-bar{top:auto!important;bottom:80px!important}
  body.navigating .fab-follow{top:auto!important;bottom:140px!important}
  body.navigating #speedometer{top:auto!important;bottom:80px!important;right:8px!important}
}

/* PANEL elements */
.sec{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.fg{margin-bottom:16px}
.irow{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.pin{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;font-family:'Syne',sans-serif}
.pin.o{background:var(--accent);color:var(--bg)}
.pin.d{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.pin.d.v{border-color:var(--accent);color:var(--accent);background:var(--adim)}
.ifield{flex:1;position:relative;min-width:0}
.ai{width:100%;height:40px;padding:0 32px 0 11px;border:1px solid var(--border);border-radius:var(--r);
  background:var(--bg2);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;
  -webkit-appearance:none;transition:border-color .15s,box-shadow .15s}
.ai:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--adim)}
.ai::placeholder{color:var(--text3)}
.clr{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:20px;height:20px;
  border:none;background:var(--bg3);border-radius:50%;color:var(--text3);font-size:13px;
  cursor:pointer;display:none;align-items:center;justify-content:center;padding:0;line-height:1}
.clr.show{display:flex}
.btn-loc{width:40px;height:40px;border:1px solid var(--border);border-radius:var(--r);
  background:var(--bg2);color:var(--text2);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0}
.btn-loc:active{border-color:var(--blue);color:var(--blue);background:var(--bdim)}
.btn-loc svg{width:16px;height:16px;pointer-events:none}
.btn-loc.sp svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.conn{height:12px;width:1.5px;background:var(--border);margin:0 0 5px 12px;border-radius:1px}
.btn-add{width:100%;height:36px;border:1px dashed var(--border2);border-radius:var(--r);
  background:none;color:var(--text2);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;margin-top:3px}
.btn-add:active{border-style:solid;border-color:var(--accent);color:var(--accent);background:var(--adim)}
.btn-rm{width:28px;height:28px;border:none;background:none;color:var(--text3);
  border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;
  cursor:pointer;flex-shrink:0;padding:0;transition:all .15s}
.btn-rm:active{background:var(--rdim);color:var(--red)}

/* MODES */
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:16px}
.mbtn{height:56px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);
  color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;transition:all .2s;padding:0}
.mbtn .ico{font-size:18px;line-height:1}
.mbtn .lbl{font-size:10px;font-weight:500}
.mbtn.on{border-color:var(--accent);background:var(--adim);color:var(--accent)}

/* ECO TOGGLE */
.eco-row{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px;margin-bottom:16px}
.eco-inf .et{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px}
.eco-inf .es{font-size:11px;color:var(--text3);margin-top:2px}
.tog{position:relative;width:38px;height:21px;flex-shrink:0;margin-left:10px}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-tr{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--border2);border-radius:11px;cursor:pointer;transition:all .2s}
.tog input:checked+.tog-tr{background:var(--accent);border-color:var(--accent)}
.tog-th{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:var(--text3);transition:all .2s;pointer-events:none}
.tog input:checked~.tog-th{transform:translateX(17px);background:var(--bg)}

/* CALC BTN */
.btn-calc{width:100%;height:46px;background:var(--accent);color:var(--bg);border:none;
  border-radius:var(--r);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;margin-bottom:10px}
.btn-calc:active{transform:scale(.98)}
.btn-calc:disabled{opacity:.35;cursor:not-allowed}
.sw{display:none;align-items:center;justify-content:center;gap:9px;padding:12px;font-size:13px;color:var(--text2)}
.sw.show{display:flex}
.sp2{width:17px;height:17px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.err{display:none;padding:10px 13px;background:var(--rdim);border:1px solid rgba(248,81,73,.3);
  border-radius:var(--r);font-size:13px;color:var(--red);margin-bottom:10px;line-height:1.5}
.err.show{display:block}

/* RESULT */
.res{display:none}
.res.show{display:block}
.divider{height:1px;background:var(--border);margin:16px 0}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.stat.ac{background:var(--adim);border-color:var(--accent)}
.sv{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.stat.ac .sv{color:var(--accent)}
.su{font-size:10px;color:var(--text3);margin-left:1px}
.sk{font-size:11px;color:var(--text3);margin-top:2px}
.eco-chip{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.eco-ci{font-size:19px;flex-shrink:0}
.eco-cv{font-size:13px;font-weight:500;color:var(--accent)}
.eco-ck{font-size:11px;color:var(--text3);margin-top:1px}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rht{font-family:'Syne',sans-serif;font-size:13px;font-weight:600}
.rbg{font-size:10px;background:var(--adim);color:var(--accent);padding:3px 8px;border-radius:20px;font-weight:500}
.ritem{display:flex;align-items:flex-start;gap:8px;padding:6px 0;position:relative}
.ritem:not(:last-child)::after{content:'';position:absolute;left:12px;top:29px;width:1.5px;height:calc(100% - 12px);background:var(--border)}
.rdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;z-index:1;font-family:'Syne',sans-serif}
.rdot.s{background:var(--accent);color:var(--bg)}
.rdot.m{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.rdot.e{background:var(--bg3);border:1px solid var(--accent);color:var(--accent)}
.ri{flex:1;padding-top:3px;min-width:0}
.rl{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.ra{font-size:13px;color:var(--text);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rleg{font-size:11px;color:var(--text3);margin-top:3px;display:flex;gap:4px;flex-wrap:wrap}
.rch{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 5px;font-size:10px}
.actns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px}
.abtn{height:38px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);
  color:var(--text2);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s}
.abtn:active{border-color:var(--accent);color:var(--accent);background:var(--adim)}
.abtn svg{width:13px;height:13px;flex-shrink:0}
.btn-nav{width:100%;height:44px;background:none;border:1.5px solid var(--accent);border-radius:var(--r);
  color:var(--accent);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;margin:10px 0 6px}
.btn-nav:active{background:var(--accent);color:var(--bg)}
.btn-nav svg{width:15px;height:15px}
.btn-new{width:100%;height:36px;border:none;background:none;color:var(--text3);
  font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;border-radius:var(--r);
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-new:active{background:var(--bg3);color:var(--text2)}

/* ── NAV HUD (over map) ── */
.nav-hud{display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:var(--bg);border:1px solid var(--border2);border-radius:var(--rlg);
  padding:12px 14px;z-index:150;min-width:280px;max-width:calc(100% - 20px);
  box-shadow:0 8px 32px rgba(0,0,0,.6)}
.nav-hud.show{display:block}
.nav-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.nav-arr{width:44px;height:44px;border-radius:10px;background:var(--accent);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.nav-arr svg{width:26px;height:26px;stroke:var(--bg);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-instr{font-size:13px;font-weight:500;color:var(--text);line-height:1.35;flex:1}
.nav-dn{font-size:13px;color:var(--accent);font-weight:700;margin-top:2px}
.nav-bot{display:flex;align-items:center;gap:8px;padding-top:8px;border-top:1px solid var(--border)}
.nav-rem{font-size:11px;color:var(--text3);flex:1}
.nav-rem b{color:var(--text2);font-weight:500}
.nav-spd{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text);flex-shrink:0}
.nav-spd-u{font-size:9px;color:var(--text3)}
.nav-spd.fast{color:var(--red)}
.btn-endnav{padding:4px 10px;border:1px solid var(--red);border-radius:6px;background:none;
  color:var(--red);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}

/* ── ALERT BANNER (radar / polícia / congestionamento) ── */
.alert-banner{
  display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);
  border-radius:var(--rlg);padding:10px 16px;z-index:165;
  align-items:center;gap:10px;
  max-width:calc(100% - 24px);min-width:220px;
  box-shadow:0 4px 24px rgba(0,0,0,.5);
  transition:opacity .3s;
  animation:alertPop .3s cubic-bezier(.175,.885,.32,1.275);
}
.alert-banner.show{display:flex}
@keyframes alertPop{from{transform:translateX(-50%) scale(.8);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
.ab-icon{font-size:26px;flex-shrink:0;line-height:1}
.ab-body{flex:1;min-width:0}
.ab-title{font-size:13px;font-weight:700;color:white;line-height:1.2}
.ab-sub{font-size:11px;color:rgba(255,255,255,.85);margin-top:2px}

/* ── REROUTE BUTTON ── */
.btn-reroute{
  display:none;position:absolute;bottom:68px;left:50%;transform:translateX(-50%);
  background:var(--accent);border:none;border-radius:24px;
  padding:10px 20px;z-index:145;
  align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--bg);
  cursor:pointer;font-family:'Syne',sans-serif;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,201,167,.5);animation:reroutePop .4s cubic-bezier(.175,.885,.32,1.275);
}
.btn-reroute.show{display:flex}
@keyframes reroutePop{from{transform:translateX(-50%) scale(.7);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
.btn-reroute svg{width:16px;height:16px;flex-shrink:0}
@media(max-width:768px){
  .btn-reroute{bottom:auto;top:calc(52vh - 56px)}
}
@media(max-width:480px){
  .btn-reroute{top:calc(45vh - 56px)}
}

/* ── GPS BAR ── */
.gps-bar{display:none;position:absolute;bottom:16px;left:16px;
  background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);
  padding:7px 11px;z-index:140;align-items:center;gap:7px;font-size:11px;color:var(--text2);
  box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:calc(100% - 70px)}
.gps-bar.show{display:flex}
.gbdot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:blink 1s infinite;flex-shrink:0}
.gbspd{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--text)}
.gbsep{width:1px;height:14px;background:var(--border);flex-shrink:0}
.gbacc{font-size:10px;color:var(--text3);white-space:nowrap}
.btn-follow-bar{padding:3px 7px;border:1px solid var(--border2);border-radius:5px;background:none;
  color:var(--text2);font-size:10px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:all .15s}
.btn-follow-bar.on{border-color:var(--blue);color:var(--blue)}
.btn-stop-gps{padding:3px 7px;border:1px solid var(--red);border-radius:5px;background:none;color:var(--red);font-size:10px;cursor:pointer;white-space:nowrap}

/* ── FAB FOLLOW ── */
.fab-follow{display:none;position:absolute;bottom:16px;right:16px;width:42px;height:42px;
  background:var(--bg);border:1.5px solid var(--border2);border-radius:50%;color:var(--text2);
  cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:140;transition:all .2s}
.fab-follow svg{width:18px;height:18px;pointer-events:none}
.fab-follow.show{display:flex}
.fab-follow.on{border-color:var(--blue);color:var(--blue);background:var(--bdim)}

/* GPS marker */
.gps-wrap{position:absolute;transform:translate(-50%,-50%);width:20px;height:20px;pointer-events:none}
.g-ring{position:absolute;inset:-7px;border-radius:50%;background:rgba(88,166,255,.12);border:1.5px solid rgba(88,166,255,.3);animation:ring 2s ease-out infinite}
.g-ring2{animation-delay:.7s}
.g-dot{position:absolute;inset:3px;border-radius:50%;background:#58a6ff;border:2.5px solid #fff;box-shadow:0 0 0 2px rgba(88,166,255,.4)}
@keyframes ring{0%{transform:scale(.5);opacity:1}100%{transform:scale(2.2);opacity:0}}
.car-mk{position:absolute;transform:translate(-50%,-50%);pointer-events:none;filter:drop-shadow(0 2px 8px rgba(0,0,0,.8))}


/* ── ALTERNATIVE ROUTES ── */
.alt-list{display:flex;flex-direction:column;gap:5px}
.alt-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;
  border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);
  cursor:pointer;text-align:left;transition:all .2s;width:100%}
.alt-btn.on{border-color:var(--accent);background:var(--adim)}
.alt-btn:active{border-color:var(--accent)}
.alt-num{width:22px;height:22px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  color:var(--text2);flex-shrink:0}
.alt-btn.on .alt-num{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.alt-info{flex:1;min-width:0}
.alt-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alt-meta{font-size:11px;color:var(--text3);margin-top:2px}
.alt-active{font-size:12px;color:var(--accent);flex-shrink:0}

.btn-view{padding:4px 9px;border:1px solid var(--border2);border-radius:6px;background:var(--bg2);color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;line-height:1}
.btn-view.on{border-color:var(--accent);background:var(--adim);color:var(--accent)}

/* ── NAV FULLSCREEN (mobile) ── */
@media(max-width:768px){
  body.navigating #map-wrap{
    height:100dvh!important;min-height:100dvh!important;
    position:fixed!important;inset:0!important;z-index:100!important;
  }
  body.navigating .panel{display:none!important}
  body.navigating .hdr{display:none!important}
  body.navigating #nav-back-btn{display:flex!important}
}
#nav-back-btn{
  display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--bg2);border:1px solid var(--border2);border-radius:24px;
  padding:10px 20px;z-index:9001;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;
  font-family:'Inter',sans-serif;box-shadow:0 4px 20px rgba(0,0,0,.7);white-space:nowrap;
}
#nav-back-btn.show-panel-mode{color:var(--accent);border-color:var(--accent);background:var(--adim)}

/* ── VELOCÍMETRO ── */
#speedometer{
  display:none;position:absolute;
  bottom:16px;right:66px; /* desktop: above fab-follow, left of it */
  width:68px;height:68px;min-width:68px;min-height:68px;
  background:rgba(13,17,23,.9);
  border:2px solid rgba(255,255,255,.25);border-radius:50%;z-index:145;
  flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.5);overflow:hidden;flex-shrink:0;
}
#speedometer.show{display:flex}
#speedometer.warn{border-color:var(--warn)!important;box-shadow:0 4px 20px rgba(240,165,0,.6)!important}
#speedometer.danger{border-color:var(--red)!important;box-shadow:0 4px 24px rgba(248,81,73,.7)!important;animation:sdanger .5s ease-in-out infinite alternate}
@keyframes sdanger{from{box-shadow:0 4px 16px rgba(248,81,73,.5)}to{box-shadow:0 4px 28px rgba(248,81,73,.9)}}
#spd-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;line-height:1;letter-spacing:-1px;text-align:center}
#speedometer.warn #spd-val{color:var(--warn)}
#speedometer.danger #spd-val{color:var(--red)}
#spd-unit{font-size:8px;color:rgba(255,255,255,.5);font-weight:500;letter-spacing:.05em;text-align:center}
#spd-limit{font-size:8px;color:rgba(255,255,255,.45);margin-top:1px;background:rgba(255,255,255,.1);border-radius:3px;padding:1px 4px;display:none;text-align:center}
#spd-limit.show{display:block}
@media(max-width:768px){
  #speedometer{bottom:auto;top:calc(52dvh - 84px);right:8px;left:auto;width:62px;height:62px;min-width:62px;min-height:62px}
  #spd-val{font-size:20px}
}
@media(max-width:480px){#speedometer{top:calc(45dvh - 84px)}}

/* ── AUTOCOMPLETE DROPDOWN ── */
.ac-drop{
  position:absolute;left:0;right:0;top:calc(100% + 3px);
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.45);
  z-index:99999;max-height:220px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.ac-item{
  padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:2px;transition:background .1s;
}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:var(--bg3)}
.ac-main{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-sec{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* PAC */
.pac-container{background:var(--bg2)!important;border:1px solid var(--border2)!important;border-radius:var(--r)!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important;font-family:'Inter',sans-serif!important;z-index:9999!important;margin-top:4px!important}
.pac-item{padding:9px 13px!important;border-top:1px solid var(--border)!important;color:var(--text2)!important;font-size:13px!important;cursor:pointer!important}
.pac-item:first-child{border-top:none!important}
.pac-item:hover,.pac-item-selected{background:var(--bg3)!important}
.pac-item-query{color:var(--text)!important;font-weight:500!important}
.pac-icon,.hdpi .pac-icon,.pac-logo::after{display:none!important}
.pac-matched{color:var(--accent)!important;font-weight:600!important}
</style>
</head>

<script>
var map,dirSvc,dirRend,geocoder;
var stops=[' ',' '];
var tMode='DRIVING';
var optAddrs=[];
var lastDirRes=null;
// GPS
var watchId=null,liveOn=false,following=true;
var gpsOvl=null,accCircle=null,lastHdg=0,lastPos=null;
// NAV
var navOn=false,navSteps=[],navIdx=0;
var lastSpokenIdx=-1,lastSpokenDist=-1;
// VOICE
var voiceOn=true;
var synth=window.speechSynthesis;
// RADARS (cache)
var radarMarkers=[],radarAlertActive=false,radarTimer=null;
// WAKE LOCK
var wakeLock=null;
// HEADING-UP MODE
var headingUpMode=false;
// AC
var acMap={};
// ─── MAP STYLE (clean, high-definition roads) ────────────────────────────────
var darkStyles=[
  {featureType:'administrative',elementType:'labels.text.fill',stylers:[{color:'#555555'}]},
  {featureType:'landscape',elementType:'all',stylers:[{color:'#f0f0ec'}]},
  {featureType:'poi',elementType:'all',stylers:[{visibility:'off'}]},
  {featureType:'road',elementType:'geometry.fill',stylers:[{color:'#ffffff'}]},
  {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#d0d0d0'},{weight:0.5}]},
  {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#444444'}]},
  {featureType:'road.highway',elementType:'geometry.fill',stylers:[{color:'#ffe082'}]},
  {featureType:'road.highway',elementType:'geometry.stroke',stylers:[{color:'#f9a825'},{weight:1}]},
  {featureType:'road.highway',elementType:'labels.text.fill',stylers:[{color:'#333333'}]},
  {featureType:'road.arterial',elementType:'geometry.fill',stylers:[{color:'#ffffff'}]},
  {featureType:'transit',elementType:'all',stylers:[{visibility:'off'}]},
  {featureType:'water',elementType:'geometry.fill',stylers:[{color:'#a8d5e8'}]},
  {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#336688'}]},
];

// ─── MAP ──────────────────────────────────────────────────────────────────────
window.initMap=function(){
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:-23.55,lng:-46.63},zoom:11,
    mapId:'DEMO_MAP_ID',
    mapTypeControl:false,fullscreenControl:false,streetViewControl:false,
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_BOTTOM}
  });
  dirSvc=new google.maps.DirectionsService();
  dirRend=new google.maps.DirectionsRenderer({suppressMarkers:true,preserveViewport:false,
    polylineOptions:{strokeColor:'#1a73e8',strokeWeight:6,strokeOpacity:.95}});
  dirRend.setMap(map);
  geocoder=new google.maps.Geocoder();
  // Load AdvancedMarkerElement async after map is ready
  google.maps.importLibrary("marker").then(function(lib){
    window._AdvancedMarkerElement=lib.AdvancedMarkerElement;
  }).catch(function(){window._AdvancedMarkerElement=null;});
  map.addListener('dragstart',function(){if(liveOn){following=false;updFlwUI()}});
  renderStops();
  initAC('origin');
  setTimeout(loadAddrs,500);
}

// ─── AUTOCOMPLETE ─────────────────────────────────────────────────────────────
var acSvc=null; // AutocompleteService — shared instance

function initAC(id){
  var input=document.getElementById(id);
  if(!input)return;

  // Remove old dropdown if exists
  var old=document.getElementById('ac-drop-'+id);
  if(old)old.remove();

  // Create suggestion dropdown
  var drop=document.createElement('div');
  drop.className='ac-drop';drop.id='ac-drop-'+id;
  drop.style.display='none';
  input.parentNode.appendChild(drop);

  var timer=null;

  input.addEventListener('input',function(){
    updClr(id);
    var val=input.value.trim();
    clearTimeout(timer);
    if(val.length<3){drop.style.display='none';drop.innerHTML='';return}
    timer=setTimeout(function(){getACSuggestions(id,val,drop)},300);
  });

  input.addEventListener('keydown',function(e){
    var items=drop.querySelectorAll('.ac-item');
    var sel=drop.querySelector('.ac-item.sel');
    if(e.key==='ArrowDown'){
      e.preventDefault();
      var next=sel?sel.nextElementSibling:items[0];
      if(sel)sel.classList.remove('sel');
      if(next)next.classList.add('sel');
    }else if(e.key==='ArrowUp'){
      e.preventDefault();
      var prev=sel?sel.previousElementSibling:items[items.length-1];
      if(sel)sel.classList.remove('sel');
      if(prev)prev.classList.add('sel');
    }else if(e.key==='Enter'){
      var s=drop.querySelector('.ac-item.sel');
      if(s){e.preventDefault();s.click();}
    }else if(e.key==='Escape'){
      drop.style.display='none';
    }
  });

  input.addEventListener('blur',function(){
    setTimeout(function(){drop.style.display='none'},200);
  });
  input.addEventListener('focus',function(){
    if(drop.children.length)drop.style.display='block';
  });
}

function getACSuggestions(id,val,drop){
  if(!acSvc){
    try{acSvc=new google.maps.places.AutocompleteService()}
    catch(e){return}
  }
  acSvc.getPlacePredictions({
    input:val,
    componentRestrictions:{country:'br'},
    types:['geocode','establishment']
  },function(preds,status){
    drop.innerHTML='';
    if(status!=='OK'||!preds||!preds.length){drop.style.display='none';return}
    preds.forEach(function(p){
      var item=document.createElement('div');
      item.className='ac-item';
      // Bold the matching part
      var main=p.structured_formatting&&p.structured_formatting.main_text||p.description;
      var sec=p.structured_formatting&&p.structured_formatting.secondary_text||'';
      item.innerHTML='<span class="ac-main">'+escHtml(main)+'</span>'+(sec?'<span class="ac-sec">'+escHtml(sec)+'</span>':'');
      item.addEventListener('mousedown',function(e){
        e.preventDefault();
        var input=document.getElementById(id);
        if(input){input.value=p.description;updClr(id);}
        drop.style.display='none';drop.innerHTML='';
      });
      drop.appendChild(item);
    });
    drop.style.display='block';
  });
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}


function updClr(id){
  var el=document.getElementById(id),c=document.getElementById('clr-'+id);
  if(!el)return;
  var h=el.value.length>0;
  if(c)c.style.display=h?'flex':'none';
  var i=parseInt(id.replace('stop-',''));
  if(!isNaN(i)){var pin=document.querySelector('#wrap-'+i+' .pin');if(pin)pin.classList.toggle('v',h)}
  saveAddrs();
}
function clrInput(id){
  var el=document.getElementById(id);if(el){el.value='';updClr(id)}
  var i=parseInt(id.replace('stop-',''));if(!isNaN(i))stops[i]='';
}

// ─── STOPS ───────────────────────────────────────────────────────────────────
function renderStops(){
  var list=document.getElementById('stops');list.innerHTML='';
  stops.forEach(function(v,i){
    var d=document.createElement('div'),can=stops.length>1;
    d.innerHTML='<div class="irow" id="wrap-'+i+'">'
      +'<div class="pin d'+(v.trim()?' v':'')+'">'+( i+1)+'</div>'
      +'<div class="ifield"><input class="ai" id="stop-'+i+'" type="text" value="'+v.replace(/"/g,'&quot;')+'" placeholder="Destino '+(i+1)+'" autocomplete="off" oninput="stops['+i+']=this.value;updClr(\'stop-'+i+'\')" />'
      +'<button class="clr'+(v.trim()?' show':'')+'" id="clr-stop-'+i+'" onclick="clrInput(\'stop-'+i+'\')">×</button></div>'
      +(can?'<button class="btn-rm" onclick="rmStop('+i+')">×</button>':'')+'</div>'
      +(i<stops.length-1?'<div class="conn"></div>':'');
    list.appendChild(d);
    setTimeout(function(ix){return function(){initAC('stop-'+ix)}}(i),80);
  });
}
function addStop(){stops.push('');renderStops();setTimeout(function(){var els=document.querySelectorAll('.ai[id^="stop-"]');if(els.length)els[els.length-1].focus()},100)}
function rmStop(i){stops.splice(i,1);renderStops()}

// ─── MODE ────────────────────────────────────────────────────────────────────
function setMode(m){
  tMode=m;
  document.querySelectorAll('.mbtn').forEach(function(b){b.classList.remove('on')});
  var b=document.getElementById('m-'+m);if(b)b.classList.add('on');
  var er=document.getElementById('eco-row'),dis=(m==='WALKING'||m==='BICYCLING');

// ─── CALC ────────────────────────────────────────────────────────────────────
function calc(){
  hideErr();
  var orig=document.getElementById('origin').value.trim();
  var dests=stops.map(function(_,i){var el=document.getElementById('stop-'+i);return el?el.value.trim():''}).filter(Boolean);
  if(!orig){showErr('Informe o ponto de partida.');return}
  if(!dests.length){showErr('Adicione pelo menos 1 destino.');return}
  document.getElementById('btn-calc').disabled=true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('res').classList.remove('show');
  rerouteSuggested=false;hideRerouteBtn();
  altRoutes=[];selectedAlt=0;
  var eco=document.getElementById('eco').checked&&(tMode==='DRIVING'||tMode==='MOTORCYCLING');
  var rm=(tMode==='MOTORCYCLING')?google.maps.TravelMode.DRIVING:google.maps.TravelMode[tMode];

  // ── FIX: build waypoints from ALL stops except the last; keep last as destination
  var waypoints=dests.slice(0,-1).map(function(a){return{location:a,stopover:true}});
  var destination=dests[dests.length-1];

  var req={
    origin:orig,
    destination:destination,
    waypoints:waypoints,
    optimizeWaypoints:true,
    provideRouteAlternatives:(dests.length<=3), // alternatives only with few stops
    travelMode:rm,region:'br',language:'pt-BR'
  };
  if(eco){req.avoidTolls=true;req.avoidHighways=true}

  dirSvc.route(req,function(res,st){
    document.getElementById('loading').classList.remove('show');
    document.getElementById('btn-calc').disabled=false;
    if(st!=='OK'){
      var msgs={NOT_FOUND:'Endereço não encontrado.',ZERO_RESULTS:'Rota não encontrada.',MAX_WAYPOINTS_EXCEEDED:'Máx. 23 paradas.',REQUEST_DENIED:'API sem permissão.',OVER_DAILY_LIMIT:'Limite atingido.'};
      showErr(msgs[st]||'Erro: '+st);return;
    }

    lastDirRes=res;
    altRoutes=res.routes;
    renderRoute(res,0,orig,dests,eco);
    renderAltRoutes(res.routes,orig,dests);
    toast('Rota calculada!');
    fetchPOIs(lastDirRes.routes[0].legs);
  });
}

function renderRoute(res,idx,orig,dests,eco){
  dirRend.setDirections(res);
  dirRend.setRouteIndex(idx);
  selectedAlt=idx;

  var route=res.routes[idx];
  var legs=route.legs;
  var order=route.waypoint_order;

  var totD=0,totT=0;
  legs.forEach(function(l){totD+=l.distance.value;totT+=l.duration.value});

  // ── FIX: correctly map waypoint_order back to original dests array
  // waypoint_order contains indices into waypoints array = dests[0..n-2]
  // destination (dests[n-1]) is always last and NOT in waypoint_order
  var wpts=dests.slice(0,-1);   // these are the waypoints
  var dest=dests[dests.length-1]; // this is the fixed destination
  var ord;
  if(wpts.length===0){
    ord=[dest]; // only 1 stop = direct destination
  }else{
    ord=order.map(function(i){return wpts[i]}); // reorder waypoints
    ord.push(dest); // destination always last
  }
  optAddrs=[orig].concat(ord);
  if(!eco)eco=false; // ensure defined

  var km=(totD/1000).toFixed(1),mins=Math.round(totT/60),hrs=Math.floor(mins/60),mr=mins%60;
  var ts=hrs>0?(hrs+'h '+mr+'min'):(mins+' min');
  document.getElementById('stats').innerHTML=
    '<div class="stat ac"><div class="sv">'+km+'<span class="su">km</span></div><div class="sk">Distância</div></div>'
    +'<div class="stat"><div class="sv">'+ts+'</div><div class="sk">Tempo estimado</div></div>'
    +'<div class="stat"><div class="sv">'+legs.length+'</div><div class="sk">Paradas</div></div>'
    +'<div class="stat"><div class="sv">'+(eco?'Sim':'Não')+'</div><div class="sk">Econômico</div></div>';
  if(eco){
    var fl=(totD/1000/12).toFixed(1),fc=(parseFloat(fl)*6.2).toFixed(2);
    document.getElementById('eco-box').innerHTML='<div class="eco-chip"><div class="eco-ci">⛽</div><div><div class="eco-cv">~'+fl+'L · R$'+fc+'</div><div class="eco-ck">Estimativa sem pedágios (12km/L · R$6,20/L)</div></div></div>';
  }else document.getElementById('eco-box').innerHTML='';

  document.getElementById('rbg').textContent=ord.length+' parada'+(ord.length!==1?'s':'');
  var all=[orig].concat(ord),rh='';
  all.forEach(function(a,i){
    var iS=i===0,iE=i===all.length-1&&all.length>1,dc=iS?'s':iE?'e':'m';
    var lbl=iS?'Partida':iE?'Parada '+i+' · Chegada':'Parada '+i;
    var leg=legs[i-1],li=leg?('<span class="rch">'+leg.distance.text+'</span><span class="rch">'+leg.duration.text+'</span>'):'';
    rh+='<div class="ritem"><div class="rdot '+dc+'">'+(iS?'⦿':i)+'</div><div class="ri"><div class="rl">'+lbl+'</div><div class="ra" title="'+a+'">'+a+'</div>'+(li?'<div class="rleg">'+li+'</div>':'')+'</div></div>';
  });
  document.getElementById('rlist').innerHTML=rh;
  document.getElementById('res').classList.add('show');
  var bounds=new google.maps.LatLngBounds();
  legs.forEach(function(l){bounds.extend(l.start_location);bounds.extend(l.end_location)});
  map.fitBounds(bounds,{top:60,right:20,bottom:60,left:window.innerWidth>768?400:20});
  drawRouteMarkers(legs);
}

// ─── POI MARKERS: RADARES, POLÍCIA, HOSPITAIS ──────────────────────────────
var poiMarkers=[];

function fetchPOIs(legs){
  // Clear existing markers
  radarMarkers=[];
  poiMarkers.forEach(function(m){try{if(m.setMap)m.setMap(null);else if(m.map!==undefined)m.map=null}catch(e){}});
  poiMarkers=[];

  // ── 0. Traffic layer ─────────────────────────────────────────────────────
  if(!trafficLayer)trafficLayer=new google.maps.TrafficLayer();
  trafficLayer.setMap(map);trafficOn=true;

  // ── 1. Police + Hospitals via new Places API (searchNearby) ─────────────────
  var totalDist=0;legs.forEach(function(l){totalDist+=l.distance.value});
  var radius=Math.min(Math.max(totalDist/legs.length/2,500),2500);
  var center={lat:legs[0].start_location.lat(),lng:legs[0].start_location.lng()};
  var addedPlaces={};

  function searchPOIType(types,emoji,bg,border,pfx,zIdx){
    google.maps.importLibrary('places').then(function(places){
      var req={
        fields:['displayName','location','id'],
        includedTypes:types,
        maxResultCount:8,
        locationRestriction:new google.maps.Circle({
          center:center, radius:radius
        })
      };
      places.Place.searchNearby(req).then(function(res){
        (res.places||[]).forEach(function(pl){
          if(addedPlaces[pl.id])return;
          addedPlaces[pl.id]=true;
          var loc=pl.location;
          var inner='<text x="13" y="14" text-anchor="middle" dominant-baseline="middle" font-size="12">'+emoji+'</text>';
          var svg=makeIcon(26,bg,border,inner);
          var m=placeIcon({lat:loc.lat(),lng:loc.lng()},svg,pfx+(pl.displayName||''),zIdx,26);
          if(m)poiMarkers.push(m);
        });
      }).catch(function(){});
    }).catch(function(){});
  }
  searchPOIType(['police'],'🚓','#1565c0','#0d47a1','🚓 ',50);
  searchPOIType(['hospital','clinic'],'🏥','#2e7d32','#1b5e20','🏥 ',60);

  // ── 2. Radars via Overpass (only works on HTTPS server, not file://) ────────
  var minLat=99,maxLat=-99,minLng=99,maxLng=-99;
  legs.forEach(function(l){
    [l.start_location,l.end_location].forEach(function(p){
      if(p.lat()<minLat)minLat=p.lat();if(p.lat()>maxLat)maxLat=p.lat();
      if(p.lng()<minLng)minLng=p.lng();if(p.lng()>maxLng)maxLng=p.lng();
    });
  });
  var pad=0.02;minLat-=pad;maxLat+=pad;minLng-=pad;maxLng+=pad;
  var bb=minLat+','+minLng+','+maxLat+','+maxLng;
  var query='[out:json][timeout:12];(node["highway"="speed_camera"]('+bb+');node["enforcement"="speed"]('+bb+'););out body;';

  var endpoints=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];
  function tryOverpass(idx){
    if(idx>=endpoints.length)return;
    fetch(endpoints[idx],{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'data='+encodeURIComponent(query)})
    .then(function(r){if(!r.ok)throw r.status;return r.json()})
    .then(function(data){
      var radCount=0;
      (data.elements||[]).forEach(function(el){
        var tags=el.tags||{};
        var maxspd=parseInt(tags.maxspeed||tags['maxspeed:advisory']||0)||0;
        var speedLabel=maxspd>0?String(maxspd):'';
        // Camera SVG on red pin
        var icon='<rect x="12" y="14" width="14" height="10" rx="1.5" fill="#c62828"/>'
          +'<circle cx="19" cy="19" r="3" fill="white"/>'
          +'<rect x="25" y="16" width="3" height="6" rx="1" fill="#c62828"/>'
          +'<rect x="17" y="12" width="4" height="3" rx="1" fill="#c62828"/>';
        var lbl=speedLabel;
        var inner='<text x="13" y="12" text-anchor="middle" dominant-baseline="middle" font-size="10">📷</text>'+(lbl?'<text x="13" y="22" text-anchor="middle" dominant-baseline="middle" font-size="7" font-weight="700" fill="white" font-family="Arial">'+lbl+'</text>':'');
        var svg=makeIcon(26,'#e65100','#bf360c',inner);
        var pos={lat:el.lat,lng:el.lon};
        radarMarkers.push({lat:el.lat,lng:el.lon,speed:maxspd});
        var m=placeIcon(pos,svg,'📷 Radar'+(maxspd?' Máx.'+maxspd+'km/h':''),100,26);
        if(m)poiMarkers.push(m);
        radCount++;
      });
      if(radCount)toast('📷 '+radCount+' radar(es) encontrado(s)');
    })
    .catch(function(e){tryOverpass(idx+1)});
  }
  tryOverpass(0);
}

// ─── BEARING CALCULATION ─────────────────────────────────────────────────────
function calcBearing(from,to){
  var lat1=from.lat()*Math.PI/180,lat2=to.lat()*Math.PI/180;
  var dLng=(to.lng()-from.lng())*Math.PI/180;
  var y=Math.sin(dLng)*Math.cos(lat2);
  var x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng);
  return(Math.atan2(y,x)*180/Math.PI+360)%360;
}

function updSpeedometer(kmh,acc){
  var el=document.getElementById('speedometer');if(!el)return;
  if(!liveOn){el.classList.remove('show');return}
  // Only show during navigation or explicitly toggled
  if(!navOn&&!document.getElementById('btn-live').classList.contains('on')){el.classList.remove('show');return}
  el.classList.add('show');
  var val=document.getElementById('spd-val');
  val.textContent=(kmh!==null&&kmh>=0)?Math.round(kmh):'--';
  var limit=null;
  if(radarMarkers.length&&kmh!==null&&lastPos){
    var nearest=null,nd=9999;
    radarMarkers.forEach(function(r){
      if(!r.speed)return;
      var d=google.maps.geometry.spherical.computeDistanceBetween(lastPos,new google.maps.LatLng(r.lat,r.lng));
      if(d<600&&d<nd){nd=d;nearest=r}
    });
    if(nearest)limit=nearest.speed;
  }
  var limitEl=document.getElementById('spd-limit');
  if(limit){limitEl.textContent='máx '+limit;limitEl.classList.add('show')}
  else limitEl.classList.remove('show');
  el.classList.remove('warn','danger');
  if(kmh!==null){
    if(limit&&kmh>limit+10)el.classList.add('danger');
    else if(limit&&kmh>limit)el.classList.add('warn');
    else if(!limit&&kmh>110)el.classList.add('danger');
    else if(!limit&&kmh>90)el.classList.add('warn');
  }
}

    if(d.stops&&d.stops.length){

function onGPS(pos){
  var lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy;
  var spd=pos.coords.speed,hdg=pos.coords.heading;

    heading=hdg;
  }else if(lastPos){
    // Calculate bearing from previous position
    heading=calcBearing(lastPos,ll);
  }else{
    heading=lastHdg;
  }
  lastHdg=heading;lastPos=ll;
  // heading-up mode
  if(navOn&&headingUpMode)applyHeadingUp(heading);
  // accuracy circle
  if(!accCircle)accCircle=new google.maps.Circle({map:map,center:ll,radius:acc,fillColor:'#58a6ff',fillOpacity:.06,strokeColor:'#58a6ff',strokeOpacity:.18,strokeWeight:1});
  else{accCircle.setCenter(ll);accCircle.setRadius(acc)}
  // marker
  if(navOn)buildCar(ll,heading);else buildDot(ll);
  if(following){map.panTo(ll);if(navOn&&map.getZoom()<16)map.setZoom(17)}
  // bar
  var kmh=(spd!=null&&spd>=0)?Math.round(spd*3.6):null;
  document.getElementById('gspd').textContent=kmh!==null?kmh:'--';
  document.getElementById('gacc').textContent=Math.round(acc);
  updSpeedometer(kmh,acc);
  // check reroute suggestion
  if(optAddrs.length&&!rerouteSuggested)checkShouldReroute(ll);
  // nav
  if(navOn){
    advStep(ll);
    // speed in hud
    var spdEl=document.getElementById('nav-spd');
    if(kmh!==null){spdEl.textContent=kmh;spdEl.classList.toggle('fast',navSteps.length&&kmh>80)}
    else spdEl.textContent='--';
    // radar + congestion check
    checkRadars(ll,kmh);
    checkCongestion(kmh);
  }
}

var arrivalConfirmed=false;
function advStep(ll){
  if(!navSteps.length)return;
  var acc=(window._lastAcc||50);
  // Only advance step if accuracy is reasonable (< 80m)
  var advThreshold=Math.max(35,Math.min(acc*0.8,60));
  while(navIdx<navSteps.length-1){
    var d=google.maps.geometry.spherical.computeDistanceBetween(ll,navSteps[navIdx].end_location);
    if(d<advThreshold){
      navIdx++;
      if(navIdx!==lastSpokenIdx){
        speak(stripHTML(navSteps[navIdx].instructions||''));
        lastSpokenIdx=navIdx;lastSpokenDist=-1;
      }
    }else break;
  }
  // voice warnings
  if(navIdx<navSteps.length-1){
    var nxt=navSteps[navIdx+1];
    var distNxt=google.maps.geometry.spherical.computeDistanceBetween(ll,navSteps[navIdx].end_location);
    var maneuver=nxt&&nxt.maneuver;
    if(maneuver&&distNxt>0){
      if(distNxt<=500&&distNxt>250&&lastSpokenDist!==500){speak('Em 500 metros, '+maneuverPT(maneuver));lastSpokenDist=500;}
      else if(distNxt<=200&&distNxt>80&&lastSpokenDist!==200){speak('Em 200 metros, '+maneuverPT(maneuver));lastSpokenDist=200;}
    }
  }
  // Arrival: require GPS accuracy ≤ 60m AND 3 consecutive readings near dest
  if(navIdx>=navSteps.length-1&&!arrivalConfirmed){
    var distEnd=google.maps.geometry.spherical.computeDistanceBetween(ll,navSteps[navSteps.length-1].end_location);
    var arrThreshold=Math.max(50,Math.min(acc*1.2,80));
    if(distEnd<arrThreshold&&acc<70){
      if(!window._arrivalCount)window._arrivalCount=0;
      window._arrivalCount++;
      if(window._arrivalCount>=2){  // 2 consecutive readings
        arrivalConfirmed=true;
        window._arrivalCount=0;
        speak('Você chegou ao destino!');
        toast('🏁 Chegou ao destino!');
        setTimeout(stopNav,4000);
      }
    }else{
      window._arrivalCount=0;
    }
  }
  updHUD();
}

function updHUD(){
  if(!navSteps.length)return;
  var s=navSteps[Math.min(navIdx,navSteps.length-1)];
  var tmp=document.createElement('div');tmp.innerHTML=s.instructions||'Siga em frente';
  document.getElementById('nav-instr').textContent=tmp.textContent||'Siga em frente';
  document.getElementById('nav-dn').textContent=s.distance&&s.distance.text?s.distance.text:'';
  var mn=(s.maneuver||'default').toLowerCase();
  var ap=ARROWS[mn]||ARROWS.default;
  document.getElementById('nav-arr').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#0d1117" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">'+ap+'</svg>';
  var rd=0,rt=0;
  for(var i=navIdx;i<navSteps.length;i++){rd+=(navSteps[i].distance&&navSteps[i].distance.value)||0;rt+=(navSteps[i].duration&&navSteps[i].duration.value)||0}
  var rk=(rd/1000).toFixed(1),rm=Math.round(rt/60),rh=Math.floor(rm/60),rmr=rm%60;
  document.getElementById('nav-rd').textContent=rk+'km';
  document.getElementById('nav-rt').textContent=rh>0?(rh+'h '+rmr+'min'):(rm+' min');
}

function maneuverPT(m){
  var map2={'turn-right':'vire à direita','turn-left':'vire à esquerda',
    'turn-slight-right':'mantenha à direita','turn-slight-left':'mantenha à esquerda',
    'turn-sharp-right':'curva fechada à direita','turn-sharp-left':'curva fechada à esquerda',
    'roundabout-right':'entre na rotatória','uturn-right':'faça o retorno',
    'straight':'siga em frente','merge':'siga em frente','ferry':'embarque na balsa'};
  return map2[m]||'continue';
}

// ─── REROUTE FROM CURRENT POSITION ───────────────────────────────────────────
var rerouteCheckTimer=null;
var rerouteSuggested=false;

function checkShouldReroute(ll){
  // Only check if we have a route but haven't started nav yet, or are navigating
  if(!optAddrs.length||!lastDirRes)return;
  if(rerouteSuggested)return;
  // Check distance from current position to original origin
  var origLeg=lastDirRes.routes[0].legs[0];
  var startPt=origLeg.start_location;
  var distFromStart=google.maps.geometry.spherical.computeDistanceBetween(ll,startPt);
  // If user is more than 300m from the route start, suggest rerouting
  if(distFromStart>300){
    // Also check if user is closer to any other stop
    var allLegs=lastDirRes.routes[0].legs;
    var minDistToRoute=distFromStart;
    allLegs.forEach(function(leg){
      var d=google.maps.geometry.spherical.computeDistanceBetween(ll,leg.start_location);
      if(d<minDistToRoute)minDistToRoute=d;
      d=google.maps.geometry.spherical.computeDistanceBetween(ll,leg.end_location);
      if(d<minDistToRoute)minDistToRoute=d;
    });
    // Show reroute button if user is significantly away from start
    if(distFromStart>300){
      showRerouteBtn();
    }
  }
}

function showRerouteBtn(){
  rerouteSuggested=true;
  document.getElementById('btn-reroute').classList.add('show');
}
function hideRerouteBtn(){
  document.getElementById('btn-reroute').classList.remove('show');
}

function rerouteFromHere(){
  if(!lastPos){toast('Aguardando sinal GPS...');return}
  if(!optAddrs.length){toast('Calcule uma rota primeiro');return}
  hideRerouteBtn();
  rerouteSuggested=false;

  // Reverse geocode current position to use as new origin
  if(!geocoder){toast("GPS ativo mas geocoder não disponível ainda. Tente novamente.");return}
  geocoder.geocode({location:lastPos,language:'pt-BR'},function(res,st){
    var originStr=(st==='OK'&&res[0])?res[0].formatted_address:(lastPos.lat().toFixed(6)+','+lastPos.lng().toFixed(6));

    // Keep all original destinations (skip original origin, keep the rest)
    var originalDests=optAddrs.slice(1); // all stops except original origin
    if(!originalDests.length){toast('Sem destinos restantes');return}

    // Filter out destinations already passed (within 80m of current position going forward)
    // Find which stop we're closest to
    var closestIdx=0,closestDist=9999;
    originalDests.forEach(function(addr,i){
      // Use the leg end locations from the direction result
      if(lastDirRes&&lastDirRes.routes[0].legs[i]){
        var d=google.maps.geometry.spherical.computeDistanceBetween(lastPos,lastDirRes.routes[0].legs[i].end_location);
        if(d<closestDist){closestDist=d;closestIdx=i}
      }
    });

    // If we're very close to a stop (< 100m), skip it (already visited)
    var remainingDests=(closestDist<100&&closestIdx<originalDests.length-1)
      ? originalDests.slice(closestIdx+1)
      : originalDests;

    if(!remainingDests.length){speak('Você já está próximo ao destino final!');toast('Próximo ao destino final!');return}

    // Update origin input
    document.getElementById('origin').value=originStr;
    updClr('origin');
    // Update stop inputs
    stops=remainingDests.map(function(a){return a});
    renderStops();
    remainingDests.forEach(function(addr,i){
      var el=document.getElementById('stop-'+i);
      if(el)el.value=addr;
      updClr('stop-'+i);
    });

    // Stop current nav
    if(navOn)stopNav();

    // Recalculate
    toast('Recalculando rota da sua posição...');
    speak('Recalculando rota.');

    // trigger calc with current position as lat/lng directly
    var eco=document.getElementById('eco').checked&&(tMode==='DRIVING'||tMode==='MOTORCYCLING');
    var rm=(tMode==='MOTORCYCLING')?google.maps.TravelMode.DRIVING:google.maps.TravelMode[tMode];
    var wpts=remainingDests.slice(0,-1).map(function(a){return{location:a,stopover:true}});
    var req={
      origin:lastPos,
      destination:remainingDests[remainingDests.length-1],
      waypoints:wpts,
      optimizeWaypoints:true,
      travelMode:rm,region:'br',language:'pt-BR'
    };
    if(eco){req.avoidTolls=true;req.avoidHighways=true}

    document.getElementById('btn-calc').disabled=true;
    document.getElementById('loading').classList.add('show');
    document.getElementById('res').classList.remove('show');

    dirSvc.route(req,function(res,st){
      document.getElementById('loading').classList.remove('show');
      document.getElementById('btn-calc').disabled=false;
      if(st!=='OK'){toast('Erro ao recalcular: '+st);return}
      dirRend.setDirections(res);lastDirRes=res;

      var route=res.routes[0],legs=route.legs,order=route.waypoint_order;
      var totD=0,totT=0;legs.forEach(function(l){totD+=l.distance.value;totT+=l.duration.value});
      var ord=order.map(function(i){return remainingDests[i]});
      if(remainingDests.length>1)ord.push(remainingDests[remainingDests.length-1]);
      else ord=[remainingDests[0]];
      optAddrs=['Posição atual'].concat(ord);

      var km=(totD/1000).toFixed(1),mins=Math.round(totT/60),hrs=Math.floor(mins/60),mr=mins%60;
      var ts=hrs>0?(hrs+'h '+mr+'min'):(mins+' min');
      document.getElementById('stats').innerHTML=
        '<div class="stat ac"><div class="sv">'+km+'<span class="su">km</span></div><div class="sk">Distância</div></div>'
        +'<div class="stat"><div class="sv">'+ts+'</div><div class="sk">Tempo estimado</div></div>'
        +'<div class="stat"><div class="sv">'+legs.length+'</div><div class="sk">Paradas</div></div>'
        +'<div class="stat"><div class="sv" style="color:var(--accent);font-size:12px">📍 Daqui</div><div class="sk">Origem</div></div>';
      document.getElementById('eco-box').innerHTML='';
      document.getElementById('rbg').textContent=ord.length+' parada'+(ord.length!==1?'s':'');

      var all=['📍 Você está aqui'].concat(ord),rh='';
      all.forEach(function(a,i){
        var iS=i===0,iE=i===all.length-1&&all.length>1,dc=iS?'s':iE?'e':'m';
        var lbl=iS?'Sua posição':iE?'Parada '+i+' · Chegada':'Parada '+i;
        var leg=legs[i-1],li=leg?('<span class="rch">'+leg.distance.text+'</span><span class="rch">'+leg.duration.text+'</span>'):'';
        rh+='<div class="ritem"><div class="rdot '+dc+'">'+(iS?'⦿':i)+'</div><div class="ri"><div class="rl">'+lbl+'</div><div class="ra" title="'+a+'">'+a+'</div>'+(li?'<div class="rleg">'+li+'</div>':'')+'</div></div>';
      });
      document.getElementById('rlist').innerHTML=rh;
      document.getElementById('res').classList.add('show');

      var bounds=new google.maps.LatLngBounds();
      legs.forEach(function(l){bounds.extend(l.start_location);bounds.extend(l.end_location)});
      bounds.extend(lastPos);
      map.fitBounds(bounds,{top:60,right:20,bottom:60,left:window.innerWidth>768?400:20});

      speak('Rota recalculada. '+ord.length+' parada'+(ord.length!==1?'s':'')+'.');
      toast('✅ Rota recalculada!');

      // Auto start nav
      setTimeout(function(){startNav()},1200);
    });
  });
}

var selectedVoice=null;

function populateVoices(){
  var sel=document.getElementById('voice-select');
  if(!sel||!synth)return;
  var voices=synth.getVoices().filter(function(v){
    return v.lang&&(v.lang.toLowerCase().startsWith('pt')||v.lang.toLowerCase().startsWith('en'));
  });
  if(!voices.length)return;
  sel.innerHTML='<option value="">🎙️ Auto</option>';
  var ptVoices=voices.filter(function(v){return v.lang.toLowerCase().startsWith('pt')});
  var enVoices=voices.filter(function(v){return v.lang.toLowerCase().startsWith('en')});
  if(ptVoices.length){
    var g=document.createElement('optgroup');g.label='Português';
    ptVoices.forEach(function(v,i){
      var o=document.createElement('option');
      o.value=v.name;
      o.textContent=v.name.replace('Google ','').replace(' Portuguese','').substring(0,20);
      if(i===0&&!selectedVoice){o.selected=true;selectedVoice=v}
      g.appendChild(o);
    });
    sel.appendChild(g);
  }
  if(enVoices.length){
    var g2=document.createElement('optgroup');g2.label='English';
    enVoices.slice(0,3).forEach(function(v){
      var o=document.createElement('option');
      o.value=v.name;
      o.textContent=v.name.replace('Google ','').substring(0,20);
      g2.appendChild(o);
    });
    sel.appendChild(g2);
  }
}

  if(!name){selectedVoice=null;return}
  var voices=synth.getVoices();
  selectedVoice=voices.find(function(v){return v.name===name})||null;
  speak('Voz selecionada: '+name.split(' ')[0]);
}

var speaking=false;
function speak(txt){
  if(!voiceOn||!synth||!txt)return;
  synth.cancel();
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='pt-BR';u.rate=1.05;u.pitch=1;u.volume=1;
  if(selectedVoice){u.voice=selectedVoice}
  else{var voices=synth.getVoices();var ptv=voices.filter(function(v){return v.lang&&v.lang.toLowerCase().startsWith('pt')});if(ptv.length)u.voice=ptv[0];}
  synth.speak(u);
}

var _lastPoliceAlert=0;
function checkRadars(ll,kmh){
  if(radarMarkers.length){
    var nearest=null,nearestDist=9999;
    radarMarkers.forEach(function(r){
      var d=google.maps.geometry.spherical.computeDistanceBetween(ll,new google.maps.LatLng(r.lat,r.lng));
      if(d<nearestDist){nearestDist=d;nearest=r}
    });
    if(nearest&&nearestDist<400){
      var dm=Math.round(nearestDist/10)*10;
      showAlertBanner('radar','📷 RADAR — '+dm+'m',nearest.speed?'Velocidade máxima: '+nearest.speed+' km/h':'');
      if(!radarAlertActive){
        radarAlertActive=true;
        speak('Atenção! Radar a '+dm+' metros.'+(nearest.speed?' Velocidade máxima '+nearest.speed+' quilômetros por hora.':''));
      }
    }else{radarAlertActive=false}
  }
  // Police proximity
  var now=Date.now();
  if(now-_lastPoliceAlert>60000){
    poiMarkers.forEach(function(m){
      if(!m.title||m.title.indexOf('Polícia')===-1)return;
      var mpos=m.getPosition();if(!mpos)return;
      var d=google.maps.geometry.spherical.computeDistanceBetween(ll,mpos);
      if(d<300){
        showAlertBanner('police','🚓 Polícia — '+Math.round(d)+'m','Reduza a velocidade');
        speak('Atenção! Posto policial a '+Math.round(d)+' metros');
        _lastPoliceAlert=now;
      }
    });
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function showErr(m){var e=document.getElementById('err');e.textContent=m;e.classList.add('show')}
function hideErr(){document.getElementById('err').classList.remove('show')}
function toast(msg){
  var t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#21262d;border:1px solid #444c56;border-radius:10px;padding:9px 16px;font-size:13px;color:#e6edf3;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5)';
    document.body.appendChild(t)}
  t.textContent=msg;t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);t._t=setTimeout(function(){t.style.transform='translateX(-50%) translateY(80px)'},2800);
}
function openMaps(){
  if(!optAddrs.length)return;
  window.open('https://www.google.com/maps/dir/'+optAddrs.map(function(a){return encodeURIComponent(a)}).join('/'),'_blank');
}
function share(){
  if(!optAddrs.length)return;
  var txt='Rota:\n'+optAddrs.map(function(a,i){return i===0?'📍 '+a:i+'. '+a}).join('\n');
  if(navigator.share)navigator.share({title:'Minha rota',text:txt}).catch(function(){});
  else navigator.clipboard&&navigator.clipboard.writeText(txt).then(function(){toast('Copiado!')});
}
function reset(){
  dirRend.setDirections({routes:[]});optAddrs=[];lastDirRes=null;
  document.getElementById('res').classList.remove('show');
  document.getElementById('origin').value='';updClr('origin');
  stops=[' ',' '];renderStops();hideErr();
  stopLive();radarMarkers=[];poiMarkers.forEach(function(m){if(m.setMap)m.setMap(null);else if(m.map)m.map=null});poiMarkers=[];rerouteSuggested=false;hideRerouteBtn();toast('Pronto para nova rota');
}
// pre-load voices
if(window.speechSynthesis)window.speechSynthesis.getVoices();
window.addEventListener('beforeunload',function(){if(synth)synth.cancel()});


</script>
